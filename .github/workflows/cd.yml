name: CD — Deploy AquaFlow

# ─── Triggers ────────────────────────────────────────────────────────────────
# 1. Automatic: fires when all 3 CI pipelines succeed on main/master
# 2. Manual:    workflow_dispatch for ad-hoc deploys or environment selection
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
        default: staging
      image_tag:
        description: 'Override image tag (leave blank for sha-<commit>)'
        required: false
        default: ''

  # Fires automatically after all 3 CI pipelines succeed on main
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'data-pipeline/**'
      - 'docker-compose.prod.yml'
      - '.env.example'

env:
  REGISTRY: ghcr.io

# ─── Prevent parallel deploys to the same environment ────────────────────────
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Resolve image tag ────────────────────────────────────────────────────────
  setup:
    name: Resolve Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
      short_sha: ${{ steps.sha.outputs.value }}

    steps:
      - name: Short SHA
        id: sha
        run: echo "value=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Resolve tag
        id: tag
        run: |
          INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "$INPUT" ]; then
            echo "value=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "value=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

  # ── Build & publish all images ───────────────────────────────────────────────
  # (runs only on push-triggered deploys; workflow_dispatch assumes images exist)
  build-images:
    name: Build & Push All Images
    runs-on: ubuntu-latest
    needs: setup
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: backend
            dockerfile: backend/Dockerfile
            image_suffix: backend
          - service: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image_suffix: frontend
          - service: data-pipeline
            context: data-pipeline
            dockerfile: data-pipeline/Dockerfile
            image_suffix: data-pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_suffix }}:${{ needs.setup.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to STAGING ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [setup, build-images]
    if: |
      always() &&
      (needs.build-images.result == 'success' || needs.build-images.result == 'skipped') &&
      vars.STAGING_DEPLOY_ENABLED == 'true'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
              "set -e
               cd /opt/aquaflow
               echo 'IMAGE_TAG=${{ needs.setup.outputs.image_tag }}' >> .env.staging
               docker compose -f docker-compose.prod.yml \
                 --env-file .env.staging \
                 pull
               docker compose -f docker-compose.prod.yml \
                 --env-file .env.staging \
                 up -d --remove-orphans
               docker image prune -f
               echo '✅ Staging deployed: ${{ needs.setup.outputs.image_tag }}'"

      - name: Wait for backend to be healthy (max 2 min)
        run: |
          HOST=${{ secrets.STAGING_HOST }}
          for i in $(seq 1 24); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "http://${HOST}:3001/api/health" || echo 000)
            echo "Attempt $i/24 — HTTP $CODE"
            [ "$CODE" = "200" ] && echo "✅ Backend healthy" && exit 0
            sleep 5
          done
          echo "❌ Backend not healthy after 120s" && exit 1

  # ── Smoke Tests on Staging ────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: [setup, deploy-staging]
    if: needs.deploy-staging.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Backend /api/health
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.STAGING_HOST }}:3001/api/health" || echo 000)
          [ "$CODE" = "200" ] \
            && echo "✅ Backend health OK" \
            || (echo "❌ Backend health returned $CODE" && exit 1)

      - name: Auth endpoint reachable (expects 401)
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.invalid","password":"smoketest123"}' \
            "http://${{ secrets.STAGING_HOST }}:3001/api/auth/login" || echo 000)
          [ "$CODE" = "401" ] \
            && echo "✅ Auth endpoint reachable (401 expected)" \
            || (echo "❌ Auth endpoint returned $CODE (expected 401)" && exit 1)

      - name: Alerts endpoint guarded (expects 401)
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.STAGING_HOST }}:3001/api/alerts" || echo 000)
          [ "$CODE" = "401" ] \
            && echo "✅ /api/alerts guarded by JWT (401)" \
            || (echo "❌ /api/alerts returned $CODE (expected 401)" && exit 1)

      - name: Frontend serves HTML
        run: |
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.STAGING_HOST }}:3000/" || echo 000)
          [ "$CODE" = "200" ] \
            && echo "✅ Frontend returns 200" \
            || (echo "❌ Frontend returned $CODE" && exit 1)

  # ── Rollback if smoke tests fail ─────────────────────────────────────────────
  rollback-staging:
    name: Rollback Staging
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: failure() && vars.STAGING_DEPLOY_ENABLED == 'true'

    steps:
      - name: Rollback to stable tag
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
              "cd /opt/aquaflow
               sed -i 's/IMAGE_TAG=.*/IMAGE_TAG=stable/' .env.staging
               docker compose -f docker-compose.prod.yml \
                 --env-file .env.staging \
                 up -d
               echo '⚠️  Rolled back to stable image'"

      - name: Create rollback issue comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Staging rollback** triggered — smoke tests failed for \`${{ needs.setup.outputs.image_tag }}\``
            });

  # ── Deploy to PRODUCTION (manual approval required) ───────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [setup, smoke-tests]
    if: |
      needs.smoke-tests.result == 'success' &&
      vars.PROD_DEPLOY_ENABLED == 'true' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production   # ← requires manual approval in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Save current tag for rollback
        id: current
        run: |
          PREV=$(ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "grep '^IMAGE_TAG=' /opt/aquaflow/.env.prod | cut -d= -f2" 2>/dev/null || echo "stable")
          echo "previous=$PREV" >> $GITHUB_OUTPUT
          echo "Previous production tag: $PREV"

      - name: Deploy to production
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
              "set -e
               cd /opt/aquaflow
               sed -i 's/IMAGE_TAG=.*/IMAGE_TAG=${{ needs.setup.outputs.image_tag }}/' .env.prod
               docker compose -f docker-compose.prod.yml \
                 --env-file .env.prod \
                 pull
               docker compose -f docker-compose.prod.yml \
                 --env-file .env.prod \
                 up -d --remove-orphans
               docker image prune -f"

      - name: Production health check (max 3 min)
        run: |
          HOST=${{ secrets.PROD_HOST }}
          for i in $(seq 1 36); do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              "http://${HOST}/api/health" || echo 000)
            echo "Attempt $i/36 — HTTP $CODE"
            [ "$CODE" = "200" ] && echo "✅ Production healthy" && exit 0
            sleep 5
          done
          echo "❌ Production health check failed — rolling back"
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd /opt/aquaflow
             sed -i 's/IMAGE_TAG=.*/IMAGE_TAG=${{ steps.current.outputs.previous }}/' .env.prod
             docker compose -f docker-compose.prod.yml --env-file .env.prod up -d"
          exit 1

      - name: Tag image as stable after successful prod deploy
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag as stable
        if: success()
        run: |
          for SVC in backend frontend data-pipeline; do
            IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/${SVC}"
            docker pull "${IMAGE}:${{ needs.setup.outputs.image_tag }}"
            docker tag "${IMAGE}:${{ needs.setup.outputs.image_tag }}" "${IMAGE}:stable"
            docker push "${IMAGE}:stable"
          done
          echo "✅ Images tagged as stable"

  # ── Summary ──────────────────────────────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, deploy-staging, smoke-tests, deploy-production]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "## AquaFlow Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`${{ needs.setup.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging deploy | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production deploy | ${{ needs.deploy-production.result }} |" >> $GITHUB_STEP_SUMMARY
