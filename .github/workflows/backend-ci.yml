name: Backend CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  # ── Job 1: TypeScript compile check ─────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript compile check
        run: npm run build

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: timescale/timescaledb:2.14.2-pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aquaflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: aquaflow_test
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-ok
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
      MQTT_BROKER_URL: mqtt://localhost:1883
      KAFKA_BROKERS: localhost:9092
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
      FRONTEND_URL: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        run: npx jest --config jest.config.js --forceExit --passWithNoTests

      - name: Coverage report
        run: npm run test:cov -- --forceExit --passWithNoTests
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14
