name: Backend CI

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ── Job 1: TypeScript build ──────────────────────────────────────────────────
  lint-and-build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript compile check
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  # ── Job 2: Security scanning ─────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Trivy + Audit)
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: backend

      - name: npm audit (HIGH + CRITICAL only)
        run: npm audit --audit-level=high --omit=dev --json | head -50 || true
        working-directory: backend

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # ── Job 3: Unit Tests (141 cases) ───────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage (141 cases)
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: timescale/timescaledb:2.14.2-pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aquaflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: aquaflow_test
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-ok
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
      MQTT_BROKER_URL: mqtt://localhost:1883
      KAFKA_BROKERS: localhost:9092
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
      FRONTEND_URL: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage
        run: npm run test:cov -- --forceExit --passWithNoTests

      - name: Report coverage (informational)
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "const s=require('./coverage/coverage-summary.json'); \
              console.log(s.total.statements.pct)")
            echo "📊 Statement coverage (services only): ${PCT}%"
            echo "ℹ️  Controllers/guards/entities excluded — tested via e2e/integration tests"
          else
            echo "⚠️  No coverage summary found"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

  # ── Job 4: Integration Tests (22 cases — no real DB needed) ─────────────────
  integration-tests:
    name: Integration Tests (22 cases)
    runs-on: ubuntu-latest
    needs: unit-tests

    defaults:
      run:
        working-directory: backend

    env:
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-ok
      JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-characters
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run integration tests
        run: npm run test:integration

  # ── Job 5: SonarQube quality gate (optional — needs SONAR_TOKEN secret) ──────
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: >
      github.event_name == 'push' &&
      vars.SONAR_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: backend

  # ── Job 6: Docker build + push to GHCR ──────────────────────────────────────
  docker-build:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [security-scan, integration-tests]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master' ||
       github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name (GHCR requires lowercase)
        id: image
        run: echo "name=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: table
          severity: CRITICAL
          exit-code: '0'
          ignore-unfixed: true
