# Dependabot — automated dependency updates for AquaFlow
# Major version bumps are ALWAYS blocked — they require manual migration.
# Only patch and minor updates are auto-proposed.

version: 2

updates:
  # ── Backend (NestJS / Node.js) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block ALL major bumps — NestJS, TypeScript, TypeORM major versions
      # are breaking changes that require manual migration and testing.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Frontend (React) ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block ALL major bumps — react-leaflet 4→5, react-router 6→7,
      # react 18→19 etc. all have breaking API changes.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Python (Data Pipeline) ──────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /data-pipeline
    schedule:
      interval: weekly
      day: tuesday
      time: "08:00"
    open-pull-requests-limit: 3
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block ALL major bumps — kafka-python 2→3, pyspark major versions
      # have breaking API changes.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # botocore must always be bumped together with boto3
      - dependency-name: "botocore"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "boto3"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci-cd]
    commit-message:
      prefix: "chore(ci)"
