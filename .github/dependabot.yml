# Dependabot — automated dependency updates for AquaFlow
# Opens PRs automatically for outdated dependencies

version: 2

updates:
  # ── Backend (NestJS / Node.js) ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Major version bumps require manual review
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typeorm"
        update-types: ["version-update:semver-major"]

  # ── Frontend (React) ────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 5
    labels: [dependencies, frontend]
    commit-message:
      prefix: "chore(deps)"

  # ── Python (Data Pipeline) ──────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /data-pipeline
    schedule:
      interval: weekly
      day: tuesday
      time: "08:00"
    open-pull-requests-limit: 3
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # botocore must be bumped together with boto3 — never independently
      - dependency-name: "botocore"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]
      - dependency-name: "boto3"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: [dependencies, ci-cd]
    commit-message:
      prefix: "chore(ci)"
