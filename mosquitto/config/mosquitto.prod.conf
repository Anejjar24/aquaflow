# ─────────────────────────────────────────────────────────────────────────────
# Mosquitto — Production Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Used by docker-compose.prod.yml
#
# Before starting, generate the password file:
#   docker run --rm eclipse-mosquitto:2 \
#     sh -c "mosquitto_passwd -b /dev/stdout <MQTT_USERNAME> <MQTT_PASSWORD>" \
#     > mosquitto/config/passwd
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────

# MQTT over TCP — internal Docker network only (not exposed to host in prod)
port 1883

# MQTT over WebSocket — exposed on port 9001 for browser clients (Socket.IO)
listener 9001
protocol websockets

# ── Persistence ──────────────────────────────────────────────────────────────

persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────────────────

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true

# ── Authentication ───────────────────────────────────────────────────────────
# Anonymous connections are rejected in production.
# The password file must exist before the broker starts.

allow_anonymous false
password_file /mosquitto/config/passwd

# ── Connection Limits ────────────────────────────────────────────────────────

max_connections 100
max_queued_messages 1000
