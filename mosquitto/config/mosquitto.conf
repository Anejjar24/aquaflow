# Mosquitto configuration for AquaFlow

# Port
port 1883

# WebSocket port
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Allow anonymous connections (for development only)
allow_anonymous true

# Maximum connections
max_connections -1

# Maximum queued messages per client
max_queued_messages 1000
