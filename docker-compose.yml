version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:2.14.2-pg15
    container_name: aquaflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aquaflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaflow-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aquaflow-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaflow-network
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: aquaflow-mosquitto
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_pub -h localhost -p 1883 -t health/check -m ok -q 0 && echo ok']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aquaflow-network
    restart: unless-stopped

  # ── Apache Kafka 3 (KRaft mode — no Zookeeper) ──────────────────────────────

  kafka:
    image: apache/kafka:3.7.1
    container_name: aquaflow-kafka
    ports:
      - '9092:9092'       # external access (host → container)
    environment:
      # KRaft — single-node broker + controller combined
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Cluster ID (required by apache/kafka for KRaft)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Retention (keep 7 days of sensor data)
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824   # 1 GB cap per partition
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - aquaflow-network
    restart: unless-stopped

  # ── MinIO — S3-compatible data lake ─────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: aquaflow-minio
    command: server /data --console-address ":9002"
    ports:
      - '9000:9000'   # S3 API
      - '9002:9002'   # Web console  (http://localhost:9002)
    environment:
      MINIO_ROOT_USER: aquaflow
      MINIO_ROOT_PASSWORD: aquaflow123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local 2>/dev/null || curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aquaflow-network
    restart: unless-stopped

  # One-shot container: creates the aquaflow-lake bucket and folder structure
  minio-init:
    image: minio/mc:latest
    container_name: aquaflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: aquaflow
      MINIO_ROOT_PASSWORD: aquaflow123
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/aquaflow-lake;
        mc mb --ignore-existing local/aquaflow-lake/raw/sensors;
        mc mb --ignore-existing local/aquaflow-lake/processed/hourly;
        mc mb --ignore-existing local/aquaflow-lake/processed/daily;
        mc mb --ignore-existing local/aquaflow-lake/models;
        mc anonymous set none local/aquaflow-lake;
        echo 'MinIO bucket structure ready';
        exit 0;
      "
    networks:
      - aquaflow-network
    restart: 'no'

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquaflow-backend
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      # Database
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: aquaflow
      # JWT — override in .env or via environment
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      # MQTT
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BROKERS: kafka:9092
      # MinIO (data lake)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health 2>/dev/null | grep -q "\"status\":\"ok\"" || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - aquaflow-network
    restart: unless-stopped

  # ── Data Pipeline: Kafka → MinIO archival consumer ──────────────────────────

  kafka-to-minio:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: aquaflow-kafka-to-minio
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: aquaflow-lake-archiver
      KAFKA_TOPIC: sensors.readings
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
      BATCH_SIZE: '500'
      FLUSH_SECS: '60'
      LOG_LEVEL: INFO
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - aquaflow-network
    restart: unless-stopped

  # ── Apache Spark — batch & streaming jobs ───────────────────────────────────

  spark-master:
    image: apache/spark:3.5.3
    container_name: aquaflow-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
    ports:
      - '8080:8080'   # Spark Web UI
      - '7077:7077'   # Spark master port
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - aquaflow-network
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.3
    container_name: aquaflow-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 2
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: aquaflow
      MINIO_SECRET_KEY: aquaflow123
      MINIO_BUCKET: aquaflow-lake
    depends_on:
      - spark-master
    networks:
      - aquaflow-network
    restart: unless-stopped

  # Spark Structured Streaming: sensors.readings → sensors.anomalies
  spark-anomaly-detector:
    image: apache/spark:3.5.3
    container_name: aquaflow-spark-anomaly
    command: >
      /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3
        /opt/spark-jobs/streaming_anomaly_detector.py
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_INPUT_TOPIC: sensors.readings
      KAFKA_OUTPUT_TOPIC: sensors.anomalies
      CHECKPOINT_DIR: /tmp/spark-checkpoints/anomaly-detector
      Z_SCORE_THRESHOLD: '2.5'
      WINDOW_DURATION: 5 minutes
      SLIDE_DURATION: 1 minute
      WATERMARK_DELAY: 2 minutes
    depends_on:
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - aquaflow-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001/api}
        REACT_APP_WS_URL: ${REACT_APP_WS_URL:-http://localhost:3001}
    container_name: aquaflow-frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aquaflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  kafka_data:
  minio_data:

networks:
  aquaflow-network:
    driver: bridge
