# ─── SonarQube / SonarCloud — AquaFlow Backend ───────────────────────────────
# Activate in CI by setting repository variable SONAR_ENABLED=true
# and secrets SONAR_TOKEN + SONAR_HOST_URL

sonar.projectKey=Anejjar24_aquaflow
sonar.organization=anejjar24
sonar.projectName=AquaFlow Backend
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=test
sonar.language=ts

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.integration-spec.ts,\
  **/*.e2e-spec.ts,\
  **/database/migrations/**,\
  **/database/seeds/**

# Coverage report (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate — wait for result before pipeline continues
sonar.qualitygate.wait=true

# Coverage exclusions (DTOs, entities, module wiring — not testable units)
sonar.coverage.exclusions=\
  **/*.dto.ts,\
  **/*.entity.ts,\
  **/*.module.ts,\
  **/main.ts
