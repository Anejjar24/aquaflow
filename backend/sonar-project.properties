# ─── SonarCloud — AquaFlow Backend (NestJS) ──────────────────────────────────
# Scans ONLY the backend/src directory — frontend and data-pipeline excluded.
# Triggered exclusively by CI (automatic analysis disabled in SonarCloud UI).

sonar.projectKey=Anejjar24_aquaflow
sonar.organization=anejjar24
sonar.projectName=AquaFlow Backend
sonar.projectVersion=1.0

# ── Source scope ─────────────────────────────────────────────────────────────
# Scan only backend TypeScript source — NOT the React frontend or Python pipeline
sonar.sources=src
sonar.tests=test
sonar.language=ts

# ── File exclusions ───────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.integration-spec.ts,\
  **/*.e2e-spec.ts,\
  **/database/migrations/**,\
  **/database/seeds/**

# ── Coverage (Jest LCOV — generated by npm run test:cov) ─────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Coverage exclusions (infrastructure wiring — not unit-testable) ───────────
sonar.coverage.exclusions=\
  **/*.dto.ts,\
  **/*.entity.ts,\
  **/*.module.ts,\
  **/*.controller.ts,\
  **/*.guard.ts,\
  **/*.filter.ts,\
  **/*.interceptor.ts,\
  **/*.decorator.ts,\
  **/main.ts,\
  **/realtime/**

# ── Quality gate ──────────────────────────────────────────────────────────────
# Wait for quality gate result before pipeline continues
sonar.qualitygate.wait=false
